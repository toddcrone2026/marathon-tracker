<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Marathon Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>

  <style>
    /* ── Reset & Base ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --text2: #9a9a9a;
      --primary: #ff6b35;
      --teal: #4ecdc4;
      --gold: #ffd700;
      --easy: #4ecdc4;
      --long: #ff6b35;
      --tempo: #ab47bc;
      --strides: #42a5f5;
      --race: #ffd700;
      --rest: #424242;
      --recovery: #66bb6a;
      --danger: #ef5350;
      --radius: 12px;
      --radius-sm: 8px;
      --tab-h: 68px;
      --header-h: 60px;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      overflow: hidden;
    }
    input, textarea, select, button { font-family: inherit; font-size: inherit; }
    button { cursor: pointer; border: none; background: none; color: inherit; }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ─────────────────────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 10;
    }
    #header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.3px;
    }
    #header-subtitle {
      font-size: 12px;
      color: var(--text2);
    }
    #settings-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border);
      font-size: 18px;
      transition: background 0.2s;
    }
    #settings-btn:hover { background: var(--border); }

    /* ── Tab Content ─────────────────────────────────────────────────────── */
    #content {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .tab-panel {
      position: absolute; inset: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .tab-panel.active {
      opacity: 1;
      pointer-events: all;
    }

    /* ── Bottom Nav ──────────────────────────────────────────────────────── */
    #tab-nav {
      height: var(--tab-h);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      z-index: 10;
    }
    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      color: var(--text2);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn svg { width: 22px; height: 22px; }
    .tab-btn.active { color: var(--primary); }

    /* ── Cards ───────────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 10px;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 14px;
      transition: opacity 0.15s, transform 0.1s;
      border: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Form Controls ───────────────────────────────────────────────────── */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--primary); }
    textarea.form-input { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }

    /* ── Progress Bar ────────────────────────────────────────────────────── */
    .progress-bar-wrap {
      height: 8px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--primary);
      transition: width 0.5s ease;
    }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-easy { background: rgba(78,205,196,0.15); color: var(--easy); }
    .badge-long { background: rgba(255,107,53,0.15); color: var(--long); }
    .badge-tempo { background: rgba(171,71,188,0.15); color: var(--tempo); }
    .badge-strides { background: rgba(66,165,245,0.15); color: var(--strides); }
    .badge-race { background: rgba(255,215,0,0.15); color: var(--race); }
    .badge-rest { background: rgba(66,66,66,0.3); color: #888; }
    .badge-recovery { background: rgba(102,187,106,0.15); color: var(--recovery); }

    /* ── Bottom Sheet ────────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: flex-end;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .sheet {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 20px 16px 32px;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 99px;
      margin: 0 auto 20px;
    }
    .sheet-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    /* ── Wizard ──────────────────────────────────────────────────────────── */
    #wizard-overlay {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 300;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #wizard-overlay.open { opacity: 1; pointer-events: all; }
    .wizard-logo {
      font-size: 52px;
      margin-bottom: 6px;
    }
    .wizard-app-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 32px;
      letter-spacing: -0.5px;
    }
    .wizard-progress {
      display: flex; gap: 6px;
      margin-bottom: 40px;
    }
    .wizard-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s, width 0.2s;
    }
    .wizard-dot.active {
      background: var(--primary);
      width: 24px;
      border-radius: 4px;
    }
    .wizard-dot.done { background: var(--teal); }
    .wizard-step {
      width: 100%;
      max-width: 360px;
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .wizard-step.active { display: flex; }
    .wizard-question {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .wizard-hint {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 28px;
    }
    .wizard-input {
      width: 100%;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      color: var(--text);
      font-size: 18px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .wizard-input:focus { border-color: var(--primary); }
    .level-cards {
      display: flex; flex-direction: column;
      gap: 10px; width: 100%;
    }
    .level-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
      width: 100%;
    }
    .level-card:hover { border-color: rgba(255,107,53,0.5); }
    .level-card.selected { border-color: var(--primary); background: rgba(255,107,53,0.08); }
    .level-card-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .level-card-desc { font-size: 12px; color: var(--text2); }
    .wizard-btn { margin-top: 28px; width: 100%; }

    /* ── Dashboard ───────────────────────────────────────────────────────── */
    .countdown-card {
      background: linear-gradient(135deg, rgba(255,107,53,0.12), rgba(255,215,0,0.06));
      border-color: rgba(255,107,53,0.3);
      text-align: center;
    }
    .countdown-number {
      font-size: 64px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
      letter-spacing: -3px;
    }
    .countdown-label {
      font-size: 14px;
      color: var(--text2);
      margin-top: 4px;
    }
    .countdown-goal {
      font-size: 13px;
      color: var(--text2);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid rgba(255,107,53,0.2);
    }
    .today-workout-card { border-color: rgba(78,205,196,0.25); }
    .today-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 8px;
    }
    .today-day {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    .today-workout-name {
      font-size: 19px;
      font-weight: 700;
    }
    .today-tip {
      font-size: 13px;
      color: var(--text2);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .week-day-cell {
      display: flex; flex-direction: column;
      align-items: center; gap: 3px;
    }
    .week-day-label {
      font-size: 10px;
      color: var(--text2);
      text-transform: uppercase;
    }
    .week-day-dot {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 600;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .week-day-dot.rest { background: var(--surface2); color: var(--text2); }
    .week-day-dot.scheduled { background: rgba(66,165,245,0.1); color: var(--strides); border-color: rgba(66,165,245,0.4); }
    .week-day-dot.completed { background: rgba(102,187,106,0.2); color: var(--recovery); border-color: var(--recovery); }
    .week-day-dot.today-ring { box-shadow: 0 0 0 3px rgba(255,107,53,0.5); }
    .week-day-dot.long-run { background: rgba(255,107,53,0.15); color: var(--long); border-color: rgba(255,107,53,0.5); }
    .week-day-miles { font-size: 10px; color: var(--text2); }
    .stat-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .stat-cell {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 12px 8px;
      text-align: center;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .phase-banner {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      background: rgba(255,215,0,0.06);
      border: 1px solid rgba(255,215,0,0.18);
      border-radius: var(--radius-sm);
      margin-bottom: 12px;
    }
    .phase-icon { font-size: 22px; }
    .phase-name { font-size: 14px; font-weight: 600; color: var(--gold); }
    .phase-desc { font-size: 12px; color: var(--text2); }

    /* ── Log Run ─────────────────────────────────────────────────────────── */
    .feel-selector {
      display: flex; gap: 8px;
      flex-wrap: wrap;
    }
    .feel-btn {
      padding: 8px 14px;
      border-radius: 99px;
      border: 2px solid var(--border);
      font-size: 14px;
      transition: all 0.15s;
      background: var(--surface2);
    }
    .feel-btn.selected {
      border-color: var(--primary);
      background: rgba(255,107,53,0.15);
      color: var(--primary);
    }
    .pace-display {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-align: center;
      margin-bottom: 14px;
    }
    .pace-value { font-size: 30px; font-weight: 700; color: var(--teal); }
    .pace-label { font-size: 12px; color: var(--text2); margin-top: 2px; }
    .run-list-item {
      display: flex; align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--surface2);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      border: 1px solid var(--border);
    }
    .run-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .run-info { flex: 1; min-width: 0; }
    .run-date { font-size: 12px; color: var(--text2); }
    .run-miles { font-size: 16px; font-weight: 700; }
    .run-detail { font-size: 12px; color: var(--text2); margin-top: 1px; }

    /* ── Goals ───────────────────────────────────────────────────────────── */
    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 14px 14px 18px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s;
    }
    .goal-card.completed { opacity: 0.55; }
    .goal-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      background: var(--primary);
      border-radius: 4px 0 0 4px;
    }
    .goal-card.completed::before { background: var(--recovery); }
    .goal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
    .goal-title { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .goal-meta { font-size: 12px; color: var(--text2); }
    .goal-check {
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 14px;
      background: var(--surface2);
    }
    .goal-check.done { background: var(--recovery); border-color: var(--recovery); color: #fff; }
    .goal-progress { margin-top: 10px; }
    .goal-progress-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .days-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,107,53,0.12);
      color: var(--primary);
      margin-top: 5px;
    }
    .days-pill.urgent { background: rgba(239,83,80,0.12); color: var(--danger); }
    .days-pill.done-pill { background: rgba(102,187,106,0.12); color: var(--recovery); }

    /* ── Progress Tab ────────────────────────────────────────────────────── */
    .user-chips {
      display: flex; gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .user-chip {
      padding: 6px 14px;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      background: var(--surface2);
      transition: all 0.15s;
    }
    .user-chip.active {
      border-color: var(--primary);
      background: rgba(255,107,53,0.12);
      color: var(--primary);
    }
    .chart-wrap {
      position: relative;
      height: 200px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stats-item {
      background: var(--surface2);
      border-radius: var(--radius-sm);
      padding: 14px;
      border: 1px solid var(--border);
    }
    .stats-item-value { font-size: 24px; font-weight: 700; }
    .stats-item-label { font-size: 11px; color: var(--text2); margin-top: 2px; }

    /* ── Plan Tab ────────────────────────────────────────────────────────── */
    .plan-week {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .plan-week-header {
      display: flex; align-items: center;
      padding: 12px 14px;
      gap: 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .plan-week-header:hover { background: rgba(255,255,255,0.03); }
    .plan-week-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .plan-week-num.current-week {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
    .plan-week-info { flex: 1; min-width: 0; }
    .plan-week-dates { font-size: 11px; color: var(--text2); }
    .plan-week-title { font-size: 14px; font-weight: 600; }
    .plan-week-chevron {
      font-size: 18px;
      color: var(--text2);
      transition: transform 0.2s;
    }
    .plan-week.open .plan-week-chevron { transform: rotate(180deg); }
    .plan-week-body {
      display: none;
      padding: 0 14px 14px;
    }
    .plan-week.open .plan-week-body { display: block; }
    .plan-day {
      display: flex; align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-top: 1px solid var(--border);
    }
    .plan-day-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      width: 28px;
      flex-shrink: 0;
      padding-top: 3px;
    }
    .plan-day-info { flex: 1; }
    .plan-day-workout { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .plan-day-tip { font-size: 12px; color: var(--text2); margin-top: 3px; font-style: italic; }
    .phase-header {
      text-align: center;
      padding: 10px 0 4px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--gold);
    }

    /* ── Settings Panel ──────────────────────────────────────────────────── */
    #settings-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: min(320px, 88vw);
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 150;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex; flex-direction: column;
    }
    #settings-panel.open { transform: translateX(0); }
    #settings-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 149;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

// APP STATE
// ═══════════════════════════════════════════════════════════════════════════
let profile = null;
let userId = null;
let allRuns = [];
let allGoals = [];
let allUsers = [];
let currentTab = 'dashboard';
let progressViewUserId = null;
let compareMode = false;
let progressChartInst = null;
let paceChartInst = null;
let selectedFeel = '';

// ═══════════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
  const stored = localStorage.getItem('marathon_profile');
  if (stored) {
    try { profile = JSON.parse(stored); } catch(e) { profile = null; }
  }
  if (profile && profile.name && profile.level) {
    userId = profile.name;
    initApp();
  } else {
    showWizard();
  }
});

function initApp() {
  renderSettings();
  switchTab('dashboard');
  loadData();
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  currentTab = tab;
  if (tab === 'dashboard') renderDashboard();
  else if (tab === 'log') renderLogTab();
  else if (tab === 'goals') renderGoalsTab();
  else if (tab === 'progress') renderProgressTab();
  else if (tab === 'plan') renderPlanTab();
}

// ═══════════════════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════════════════
async function loadData() {
  if (!userId) return;

  // Upsert user doc
  const userRef = db.collection('users').doc(userId);
  userRef.get().then(snap => {
    if (!snap.exists) {
      userRef.set({
        name: profile.name,
        level: profile.level,
        weeklyMiles: profile.weeklyMiles,
        goal: profile.goal,
        goalDate: profile.goalDate || '2026-10-10',
        shareProgress: true,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  });

  // Real-time runs
  db.collection('runs').where('userId','==',userId).orderBy('date','desc')
    .onSnapshot(snap => {
      allRuns = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentTab === 'dashboard') renderDashboard();
      else if (currentTab === 'log') renderLogTab();
      else if (currentTab === 'progress') renderProgressTab();
    }, err => console.error('runs:', err));

  // Real-time goals
  db.collection('goals').where('userId','==',userId).orderBy('createdAt','desc')
    .onSnapshot(snap => {
      allGoals = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      if (currentTab === 'goals') renderGoalsTab();
      if (currentTab === 'dashboard') renderDashboard();
    }, err => console.error('goals:', err));

  // All users (for progress sharing)
  db.collection('users').onSnapshot(snap => {
    allUsers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!progressViewUserId) progressViewUserId = userId;
    if (currentTab === 'progress') renderProgressTab();
    renderSettings();
  }, err => console.error('users:', err));
}

// ═══════════════════════════════════════════════════════════════════════════
// WIZARD
// ═══════════════════════════════════════════════════════════════════════════
let wizardStep = 0;
let wizardData = {};

function showWizard() {
  document.getElementById('wizard-overlay').classList.add('open');
  renderWizardStep();
}

function renderWizardStep() {
  const totalSteps = 4;
  const dotsEl = document.getElementById('wizard-dots');
  dotsEl.innerHTML = Array.from({length: totalSteps}, (_, i) =>
    `<div class="wizard-dot ${i < wizardStep ? 'done' : i === wizardStep ? 'active' : ''}"></div>`
  ).join('');

  const stepsEl = document.getElementById('wizard-steps');
  const isLast = wizardStep === totalSteps - 1;
  let content = '';

  if (wizardStep === 0) {
    content = `
      <div class="wizard-question">What's your name?</div>
      <div class="wizard-hint">How should we address you in the app?</div>
      <input class="wizard-input" id="wiz-input" type="text" placeholder="Your first name" autocomplete="off" maxlength="40" value="${wizardData.name||''}" onkeydown="if(event.key==='Enter')wizardNext()" />
    `;
  } else if (wizardStep === 1) {
    content = `
      <div class="wizard-question">What's your current level?</div>
      <div class="wizard-hint">We'll build your training plan around this.</div>
      <div class="level-cards">
        ${[
          {id:'beginner', title:'Beginner', desc:'First marathon or running <15 mi/week. Building the base.'},
          {id:'intermediate', title:'Intermediate', desc:'Have run before, 15–30 mi/week. Looking to improve.'},
          {id:'advanced', title:'Advanced', desc:'Experienced racer, 30+ mi/week. Going for a fast time.'}
        ].map(l => `
          <button class="level-card ${wizardData.level===l.id?'selected':''}" onclick="selectLevel('${l.id}')">
            <div class="level-card-title">${l.title}</div>
            <div class="level-card-desc">${l.desc}</div>
          </button>
        `).join('')}
      </div>
    `;
  } else if (wizardStep === 2) {
    content = `
      <div class="wizard-question">Miles per week right now?</div>
      <div class="wizard-hint">Roughly how many miles you typically run each week.</div>
      <input class="wizard-input" id="wiz-input" type="number" placeholder="e.g. 15" min="0" max="200" value="${wizardData.weeklyMiles||''}" onkeydown="if(event.key==='Enter')wizardNext()" />
    `;
  } else if (wizardStep === 3) {
    content = `
      <div class="wizard-question">What's your goal?</div>
      <div class="wizard-hint">Describe your goal and set a target date — can be your race, a milestone, or anything you're working toward.</div>
      <input class="wizard-input" id="wiz-input" type="text" placeholder="e.g. Finish under 5 hours" maxlength="100" value="${wizardData.goal||''}" style="margin-bottom:12px;" onkeydown="if(event.key==='Enter')wizardNext()" />
      <label style="font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;display:block;margin-bottom:6px;">Target Date</label>
      <input class="wizard-input" id="wiz-date" type="date" value="${wizardData.goalDate||''}" style="font-size:16px;" />
    `;
  }

  stepsEl.innerHTML = `
    <div class="wizard-step active">
      ${content}
      <button class="btn btn-primary btn-full wizard-btn" onclick="wizardNext()">
        ${isLast ? 'Start Training 🏁' : 'Continue →'}
      </button>
      ${wizardStep > 0 ? '<button class="btn btn-secondary btn-full" style="margin-top:8px;" onclick="wizardBack()">← Back</button>' : ''}
    </div>
  `;
  setTimeout(() => {
    const inp = document.getElementById('wiz-input');
    if (inp) inp.focus();
  }, 80);
}

function selectLevel(lvl) {
  wizardData.level = lvl;
  document.querySelectorAll('.level-card').forEach(el => {
    const isMatch = el.getAttribute('onclick') && el.getAttribute('onclick').includes(`'${lvl}'`);
    el.classList.toggle('selected', isMatch);
  });
}

function wizardNext() {
  if (wizardStep === 0) {
    const v = (document.getElementById('wiz-input').value || '').trim();
    if (!v) { showToast('Please enter your name'); return; }
    wizardData.name = v;
  } else if (wizardStep === 1) {
    if (!wizardData.level) { showToast('Choose your level'); return; }
  } else if (wizardStep === 2) {
    const v = document.getElementById('wiz-input').value;
    if (!v || isNaN(Number(v)) || Number(v) < 0) { showToast('Enter a valid number'); return; }
    wizardData.weeklyMiles = Number(v);
  } else if (wizardStep === 3) {
    const v = (document.getElementById('wiz-input').value || '').trim();
    if (!v) { showToast('Add your goal!'); return; }
    wizardData.goal = v;
    wizardData.goalDate = document.getElementById('wiz-date').value || '';
    // Done
    profile = { ...wizardData };
    localStorage.setItem('marathon_profile', JSON.stringify(profile));
    userId = profile.name;
    document.getElementById('wizard-overlay').classList.remove('open');
    initApp();
    // Add the race goal to Firestore
    db.collection('goals').add({
      userId,
      title: profile.goal,
      targetDate: profile.goalDate,
      metricType: 'none',
      targetValue: '',
      completed: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    return;
  }
  wizardStep++;
  renderWizardStep();
}

function wizardBack() {
  wizardStep = Math.max(0, wizardStep - 1);
  renderWizardStep();
}

  const planMiles = getPlanMilesUpToNow(wi);

  const weeklyAvg = calcWeeklyAvg();

    </div>`}

    <div class="card">
      <div class="card-title">This Week ${wi ? '— Week '+wi.weekNum : ''}</div>

function buildTodayCard(w) {
  const isRest = w.type === 'rest';
  const typeVar = `var(--${w.type})`;
  return `
    <div class="card today-workout-card">
      <div class="today-header">
        <div>
          <div class="today-day">Today · ${w.dayName} · Week ${w.weekNum}</div>
          <div class="today-workout-name" style="color:${typeVar}">${w.desc}</div>
        </div>
        <span class="badge badge-${w.type}">${w.type}</span>
      </div>
      <div class="today-tip">💡 ${w.tip}</div>
      ${!isRest ? `<button class="btn btn-primary btn-full" style="margin-top:12px;" onclick="switchTab('log')">Log This Run →</button>` : ''}
    </div>
  `;
}

function buildWeekGrid(wi, weekRuns) {
  if (!wi) {
    const now = new Date();
    return `<div class="text-muted" style="font-size:13px;">${now < PLAN_START ? 'Plan starts May 11, 2026.' : 'Plan complete!'}</div>`;
  }
  const plan = PLANS[profile.level];
  const week = plan.weeks[wi.weekNum - 1];
  if (!week) return '';
  const today = new Date(); today.setHours(0,0,0,0);
  const loggedDates = new Set(weekRuns.map(r => r.date));

  return `
    <div class="week-grid">
      ${DAYS.map((d, i) => {
        const dayDate = new Date(wi.weekStart);
        dayDate.setDate(wi.weekStart.getDate() + i);
        dayDate.setHours(0,0,0,0);
        const w = week.days[i];
        const isToday = dayDate.getTime() === today.getTime();
        const done = loggedDates.has(formatDateKey(dayDate));
        let cls = 'rest';
        if (!done) {
          if (w.type === 'long') cls = 'long-run';
          else if (w.type !== 'rest') cls = 'scheduled';
        } else {
          cls = 'completed';
        }
        if (isToday) cls += ' today-ring';
        const label = done ? '✓' : (w.miles > 0 ? w.miles : '–');
        return `
          <div class="week-day-cell">
            <div class="week-day-label">${d}</div>
            <div class="week-day-dot ${cls}">${label}</div>
            <div class="week-day-miles">${w.miles > 0 ? w.miles+'mi' : ''}</div>
          </div>
        `;
      }).join('')}
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--text2);">
      ${week.total}mi planned ${week.label ? '· <span style="color:var(--gold)">'+week.label+'</span>' : ''}
    </div>
  `;
}

function getCurrentWeekInfo() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(PLAN_START); start.setHours(0,0,0,0);
  if (today < start) return null;
  const diffDays = Math.floor((today - start) / 86400000);
  const weekNum = Math.floor(diffDays / 7) + 1;
  if (weekNum > 21) return null;
  const weekStart = new Date(start);
  weekStart.setDate(start.getDate() + (weekNum - 1) * 7);
  return { weekNum, weekStart };
}

function getTodayWorkout() {
  const today = new Date(); today.setHours(0,0,0,0);
  const start = new Date(PLAN_START); start.setHours(0,0,0,0);
  const diff = Math.floor((today - start) / 86400000);
  if (diff < 0 || diff >= 147) return null;
  const weekIdx = Math.floor(diff / 7);
  const dayIdx = diff % 7;
  const week = PLANS[profile.level].weeks[weekIdx];
  if (!week) return null;
  return { ...week.days[dayIdx], weekNum: weekIdx + 1, dayName: DAYS[dayIdx] };
}

function getThisWeekRuns(wi) {
  if (!wi) return [];
  const end = new Date(wi.weekStart);
  end.setDate(wi.weekStart.getDate() + 7);
  return allRuns.filter(r => {
    const d = new Date(r.date + 'T00:00:00');
    return d >= wi.weekStart && d < end;
  });
}

function calcWeeklyAvg() {
  if (!allRuns.length) return '0';
  const last = allRuns[allRuns.length - 1];
  const firstDate = new Date((last.date || '').replace(/-/g,'/'));
  const weeks = Math.max(1, Math.ceil((Date.now() - firstDate) / (7 * 86400000)));
  const total = allRuns.reduce((s, r) => s + (r.miles||0), 0);
  return (total / weeks).toFixed(1);
}

function getPlanMilesUpToNow(wi) {
  if (!wi) return 0;
  const plan = PLANS[profile.level];
  let total = 0;
  for (let i = 0; i < wi.weekNum - 1; i++) total += plan.weeks[i]?.total || 0;
  const today = new Date(); today.setHours(0,0,0,0);
  const dayOfWeek = Math.floor((today - wi.weekStart) / 86400000);
  const curWeek = plan.weeks[wi.weekNum - 1];
  if (curWeek) {
    for (let d = 0; d <= dayOfWeek; d++) total += curWeek.days[d]?.miles || 0;
  }
  return total;
}

            <input class="form-input" type="number" id="run-mins" placeholder="m" min="0" max="59" style="padding:10px 4px;text-align:center;" oninput="calcPace()" />
            <input class="form-input" type="number" id="run-secs" placeholder="s" min="0" max="59" style="padding:10px 4px;text-align:center;" oninput="calcPace()" />
          </div>
        </div>
      </div>

      <div class="pace-display">
        <div class="pace-value" id="pace-value">–:––</div>
        <div class="pace-label">per mile</div>
      </div>

      <div class="form-group">
        <label class="form-label">How'd it feel?</label>
        <div class="feel-selector">
          ${['😫 Rough','😕 Hard','😐 OK','😊 Good','🔥 Great'].map(f => `
            <button class="feel-btn" onclick="selectFeel(this,'${f.replace("'","\\'")}')">
              ${f}
            </button>
          `).join('')}
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-input" id="run-notes" placeholder="Weather, how you felt, anything worth noting..."></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="saveRun()">Save Run</button>
    </div>

    <div class="section-title" style="margin-top:4px;">Recent Runs</div>
    ${allRuns.length === 0 ? `
      <div class="empty-state">
        <div class="empty-state-icon">👟</div>
        <div class="empty-state-text">No runs logged yet.<br>Log your first one above!</div>
      </div>
    ` : allRuns.slice(0, 25).map(buildRunItem).join('')}
  `;
}

function selectFeel(btn, feel) {
  selectedFeel = feel;
  document.querySelectorAll('.feel-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function calcPace() {
  const miles = parseFloat(document.getElementById('run-miles').value) || 0;
  const hrs = parseInt(document.getElementById('run-hrs').value) || 0;
  const mins = parseInt(document.getElementById('run-mins').value) || 0;
  const secs = parseInt(document.getElementById('run-secs').value) || 0;
  const totalSecs = hrs * 3600 + mins * 60 + secs;
  if (!miles || !totalSecs) { document.getElementById('pace-value').textContent = '–:––'; return; }
  const secPerMile = totalSecs / miles;
  const pm = Math.floor(secPerMile / 60);
  const ps = Math.round(secPerMile % 60);
  document.getElementById('pace-value').textContent = `${pm}:${ps.toString().padStart(2,'0')}`;
}

async function saveRun() {
  const date = document.getElementById('run-date').value;
  const miles = parseFloat(document.getElementById('run-miles').value);
  const hrs = parseInt(document.getElementById('run-hrs').value) || 0;
  const mins = parseInt(document.getElementById('run-mins').value) || 0;
  const secs = parseInt(document.getElementById('run-secs').value) || 0;
  if (!date) { showToast('Pick a date'); return; }
  if (!miles || miles <= 0) { showToast('Enter distance'); return; }
  const totalMins = hrs * 60 + mins + secs / 60;
  const pace = totalMins > 0 ? totalMins / miles : 0;
  const notes = (document.getElementById('run-notes').value || '').trim();
  try {
    await db.collection('runs').add({
      userId, date, miles, mins: totalMins, pace,
      feel: selectedFeel, notes,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('Run saved! 🎉');
    selectedFeel = '';
    renderLogTab();
  } catch(e) {
    showToast('Error saving — check connection');
    console.error(e);
  }
}

function buildRunItem(r) {
  const paceStr = r.pace > 0
    ? `${Math.floor(r.pace)}:${Math.round((r.pace % 1) * 60).toString().padStart(2,'0')}/mi`
    : '';
  const totalTime = r.mins > 0
    ? (() => {
        const h = Math.floor(r.mins / 60);
        const m = Math.floor(r.mins % 60);
        return h > 0 ? `${h}h ${m}m` : `${m}m`;
      })()
    : '';
  return `
    <div class="run-list-item">
      <div class="run-dot" style="background:var(--primary)"></div>
      <div class="run-info">
        <div class="run-date">${formatDisplayDate(r.date)}</div>
        <div class="run-miles">${r.miles} mi ${r.feel ? '<span style="font-size:13px;margin-left:4px;">'+r.feel+'</span>' : ''}</div>
        <div class="run-detail">${[paceStr, totalTime, r.notes?.slice(0,50)].filter(Boolean).join(' · ')}</div>
      </div>
    </div>
  `;
}

      </div>
    ` : allGoals.map(buildGoalCard).join('')}
  `;
}

function buildGoalCard(g) {
  const today = new Date(); today.setHours(0,0,0,0);
  const target = g.targetDate ? new Date(g.targetDate + 'T00:00:00') : null;
  const daysLeft = target ? Math.ceil((target - today) / 86400000) : null;

  let pillHtml = '';
  if (g.completed) {
    pillHtml = '<span class="days-pill done-pill">✓ Completed!</span>';
  } else if (daysLeft !== null) {
    if (daysLeft > 0) {
      pillHtml = `<span class="days-pill ${daysLeft < 14 ? 'urgent' : ''}">${daysLeft} days left</span>`;
    } else if (daysLeft === 0) {
      pillHtml = '<span class="days-pill urgent">Today!</span>';
    } else {
      pillHtml = '<span class="days-pill urgent">Overdue</span>';
    }
  }

  let progressHtml = '';
  if (!g.completed && g.metricType && g.metricType !== 'none' && g.targetValue) {
    const current = getMetricCurrent(g.metricType);
    const tgt = parseFloat(g.targetValue);
    const pct = tgt > 0 ? Math.min(100, Math.round((current / tgt) * 100)) : 0;
    progressHtml = `
      <div class="goal-progress">
        <div class="goal-progress-label">
          <span>${metricLabel(g.metricType)}: ${current.toFixed(1)} / ${tgt}</span>
          <span>${pct}%</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width:${pct}%;background:var(--teal)"></div>
        </div>
      </div>`;
  }

  return `
    <div class="goal-card ${g.completed?'completed':''}">
      <div class="goal-header">
        <div style="flex:1;min-width:0;">
          <div class="goal-title">${g.title}</div>
          ${g.targetDate ? `<div class="goal-meta">${formatDisplayDate(g.targetDate)}</div>` : ''}
          ${pillHtml}
        </div>
        <button class="goal-check ${g.completed?'done':''}" onclick="toggleGoal('${g.id}',${!g.completed})" title="${g.completed?'Mark incomplete':'Mark complete'}">
          ${g.completed ? '✓' : ''}
        </button>
      </div>
      ${progressHtml}
    </div>
  `;
}

function getMetricCurrent(mt) {
  if (mt === 'distance') return allRuns.reduce((s, r) => s + (r.miles||0), 0);
  if (mt === 'weekly_miles') {
    const wi = getCurrentWeekInfo();
    const weekRuns = getThisWeekRuns(wi);
    return weekRuns.reduce((s, r) => s + (r.miles||0), 0);
  }
  if (mt === 'pace') {
    const paced = allRuns.filter(r => r.pace > 0).slice(0, 5);
    return paced.length ? paced.reduce((s, r) => s + r.pace, 0) / paced.length : 0;
  }
  return 0;
}

function metricLabel(mt) {
  return { distance:'Total miles logged', weekly_miles:'This week\'s miles', pace:'Avg pace (min/mi)' }[mt] || mt;
}

async function toggleGoal(id, done) {
  try {
    await db.collection('goals').doc(id).update({ completed: done });

async function renderProgressTab() {

        <div class="stats-item-value text-primary">${total.toFixed(1)}</div>
        <div class="stats-item-label">Total Miles</div>
      </div>

      </div>
      <div class="stats-item">
        <div class="stats-item-value">${fmtPace(avgPace)}</div>
        <div class="stats-item-label">Avg Pace /mi</div>
      </div>
      <div class="stats-item">
        <div class="stats-item-value text-gold">${longest.toFixed(1)}</div>
        <div class="stats-item-label">Longest Run</div>
      </div>

    <div class="card">
      <div class="flex-between mb-8">

        ${sharingUsers.length > 1 ? `<button class="btn btn-secondary" style="font-size:12px;padding:5px 10px;" onclick="toggleCompare()">${compareMode?'Solo View':'Compare All'}</button>` : ''}
      </div>
      <div class="chart-wrap"><canvas id="weekly-chart"></canvas></div>
    </div>

      <div class="card-title">Pace Trend</div>
      <div class="chart-wrap"><canvas id="pace-chart"></canvas></div>
    </div>
  `;

  if (compareMode && sharingUsers.length > 1) {
    renderCompareChart(sharingUsers);

function setProgressUser(uid) {
  progressViewUserId = uid;
  compareMode = false;
  renderProgressTab();
}

function toggleCompare() {
  compareMode = !compareMode;
  renderProgressTab();
}

function getWeeklyMilesMap(runs) {
  const map = {};
  runs.forEach(r => {
    if (!r.date) return;
    const d = new Date(r.date + 'T00:00:00');
    const ms = new Date(d);
    // Monday of that week
    const dow = d.getDay(); // 0=Sun
    const diff = dow === 0 ? -6 : 1 - dow;
    ms.setDate(d.getDate() + diff);
    const key = formatDateKey(ms);
    map[key] = (map[key] || 0) + (r.miles || 0);
  });
  return map;
}

function renderWeeklyChart(runs) {
  const canvas = document.getElementById('weekly-chart');
  if (!canvas) return;
  if (progressChartInst) { progressChartInst.destroy(); progressChartInst = null; }
  const map = getWeeklyMilesMap(runs);
  const keys = Object.keys(map).sort().slice(-12);
  progressChartInst = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: keys.map(k => { const d = new Date(k+'T00:00:00'); return (d.getMonth()+1)+'/'+(d.getDate()); }),
      datasets: [{
        data: keys.map(k => +map[k].toFixed(1)),
        backgroundColor: 'rgba(255,107,53,0.55)',
        borderColor: '#ff6b35',
        borderWidth: 1,
        borderRadius: 4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#2e2e2e' }, ticks: { color: '#9a9a9a', font: { size: 11 } } },
        y: { grid: { color: '#2e2e2e' }, ticks: { color: '#9a9a9a', font: { size: 11 } }, beginAtZero: true }
      }
    }
  });
}

async function renderCompareChart(users) {
  const canvas = document.getElementById('weekly-chart');
  if (!canvas) return;
  if (progressChartInst) { progressChartInst.destroy(); progressChartInst = null; }
  const colors = ['#ff6b35','#4ecdc4','#ffd700','#ab47bc','#42a5f5','#66bb6a'];
  const allKeys = new Set();
  const datasets = [];
  for (let i = 0; i < users.length; i++) {
    const u = users[i];
    let runs;
    if (u.id === userId) { runs = allRuns; }
    else {
      try {
        const snap = await db.collection('runs').where('userId','==',u.id).get();
        runs = snap.docs.map(d => d.data());
      } catch(e) { runs = []; }
    }
    const map = getWeeklyMilesMap(runs);
    Object.keys(map).forEach(k => allKeys.add(k));
    datasets.push({ label: u.name||u.id, map, color: colors[i % colors.length] });
  }
  const keys = [...allKeys].sort().slice(-10);
  progressChartInst = new Chart(canvas, {
    type: 'line',
    data: {
      labels: keys.map(k => { const d = new Date(k+'T00:00:00'); return (d.getMonth()+1)+'/'+(d.getDate()); }),
      datasets: datasets.map(ds => ({
        label: ds.label,
        data: keys.map(k => +(ds.map[k]||0).toFixed(1)),
        borderColor: ds.color,
        backgroundColor: 'transparent',
        tension: 0.3, pointRadius: 3
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { labels: { color: '#9a9a9a', font: { size: 11 }, boxWidth: 12 } } },
      scales: {
        x: { grid: { color: '#2e2e2e' }, ticks: { color: '#9a9a9a', font: { size: 10 } } },
        y: { grid: { color: '#2e2e2e' }, ticks: { color: '#9a9a9a', font: { size: 11 } }, beginAtZero: true }
      }
    }
  });
}

function renderPaceChart(runs) {
  const canvas = document.getElementById('pace-chart');
  if (!canvas) return;
  if (paceChartInst) { paceChartInst.destroy(); paceChartInst = null; }
  const paceRuns = runs.filter(r => r.pace > 0 && r.date).slice(0, 20).reverse();
  paceChartInst = new Chart(canvas, {
    type: 'line',
    data: {
      labels: paceRuns.map(r => formatDisplayDateShort(r.date)),
      datasets: [{
        data: paceRuns.map(r => +r.pace.toFixed(2)),
        borderColor: '#4ecdc4',
        backgroundColor: 'rgba(78,205,196,0.1)',
        fill: true, tension: 0.3,
        pointRadius: 4, pointBackgroundColor: '#4ecdc4'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: '#2e2e2e' }, ticks: { color: '#9a9a9a', font: { size: 10 } } },
        y: {
          grid: { color: '#2e2e2e' },
          ticks: {
            color: '#9a9a9a', font: { size: 11 },
            callback: v => `${Math.floor(v)}:${Math.round((v%1)*60).toString().padStart(2,'0')}`
          },
          reverse: true
        }
      }
    }
  });
}

function renderPlanTab() {
  const el = document.getElementById('plan-content');
  if (!el || !profile) return;
  const plan = PLANS[profile.level];
  const wi = getCurrentWeekInfo();
  const curWeekNum = wi ? wi.weekNum : -1;
  let lastPhase = '';
  let html = `
    <div class="section-title">${plan.name} Plan <span style="font-size:13px;font-weight:400;color:var(--text2);">· 21 weeks to Oct 10</span></div>
  `;
  plan.weeks.forEach((week, idx) => {
    const wn = idx + 1;
    const phase = plan.phases[wn];
    if (phase !== lastPhase) {
      html += `<div class="phase-header">── ${phase} ──</div>`;
      lastPhase = phase;
    }
    const wStart = new Date(PLAN_START);
    wStart.setDate(PLAN_START.getDate() + idx * 7);
    const wEnd = new Date(wStart);
    wEnd.setDate(wStart.getDate() + 6);
    const isCur = wn === curWeekNum;
    html += `
      <div class="plan-week ${isCur ? 'open' : ''}" id="plan-week-${wn}">
        <div class="plan-week-header" onclick="togglePlanWeek(${wn})">
          <div class="plan-week-num ${isCur ? 'current-week' : ''}">${wn}</div>
          <div class="plan-week-info">
            <div class="plan-week-title">${week.total}mi${week.label ? ' · '+week.label : ''}</div>
            <div class="plan-week-dates">${fmtDate(wStart)} – ${fmtDate(wEnd)}</div>
          </div>
          <div class="plan-week-chevron">⌄</div>
        </div>
        <div class="plan-week-body">
          ${week.days.map((d, di) => `
            <div class="plan-day">
              <div class="plan-day-label">${DAYS[di]}</div>
              <div class="plan-day-info">
                <div class="plan-day-workout">
                  <span class="badge badge-${d.type}">${d.type}</span>
                  ${d.desc}
                </div>
                ${d.type !== 'rest' ? `<div class="plan-day-tip">💡 ${d.tip}</div>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });
  el.innerHTML = html;
  if (curWeekNum > 0) {
    setTimeout(() => {
      const w = document.getElementById(`plan-week-${curWeekNum}`);
      if (w) w.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 150);
  }
}

function togglePlanWeek(n) {
  const el = document.getElementById(`plan-week-${n}`);
  if (el) el.classList.toggle('open');
}

        <div class="settings-row-value" style="margin-top:2px;">Let others see your stats &amp; charts</div>
      </div>
      <div class="toggle ${sharing?'on':''}" id="share-toggle" onclick="toggleShare()"></div>
    </div>
    <div class="divider" style="margin-top:20px;"></div>
    <p style="font-size:12px;color:var(--text2);margin-top:14px;line-height:1.6;">
      Marathon Tracker v2<br>
      Plan: ${capitalize(profile.level)} · 21 weeks<br>
      Race Date: October 10, 2026
    </p>
  `;
}

async function toggleShare() {
  const userDoc = allUsers.find(u => u.id === userId);
  const current = userDoc ? userDoc.shareProgress !== false : true;
  try {
    await db.collection('users').doc(userId).update({ shareProgress: !current });
    showToast(!current ? 'Progress now visible to others' : 'Progress hidden from others');
    renderSettings();
  } catch(e) { showToast('Error updating setting'); }
}

// ═══════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════════════
function formatDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function formatDisplayDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function formatDisplayDateShort(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return `${d.getMonth()+1}/${d.getDate()}`;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function capitalize(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
}

let _toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
